<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创新实验室</title>
<style>
@import url('tokens.css');

body{min-height:100vh}
header{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:10px}
header h1{font-size:18px;font-weight:600}
.back{color:#93c5fd;cursor:pointer;font-size:13px;display:none;align-items:center;gap:4px}
.back:hover{color:#fff}
.back.show{display:flex}
.stats{background:var(--primary-bg);padding:6px 20px;font-size:11px;color:var(--primary);display:flex;gap:16px}
.content{padding:12px 20px}

/* === Level 0: Directory === */
#dir{display:block}
#dir.hide{display:none}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select,.filters input{padding:4px 8px;font-size:13px}
.filters input{flex:1;min-width:160px;max-width:280px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{padding:12px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-name{font-size:14px;font-weight:600}
.card-desc{font-size:11px;color:var(--text-secondary);margin-bottom:6px}
.dt{background:var(--primary-bg);color:var(--primary);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px}
.list{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.li-row{padding:3px 6px;border-radius:3px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;transition:background .1s}
.li-row:hover{background:var(--primary-bg)}
.li-row:active{transform:scale(.98)}
.li-row .lb{display:flex;align-items:center;gap:4px}
.li-row .lb .s{display:inline-block;width:6px;height:6px;border-radius:50%}
.li-row .lb .s.ok{background:var(--success)}
.li-row .lb .s.wip{background:var(--warning)}
.li-row .meta{color:var(--text-muted);font-size:10px}
.empty{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;grid-column:1/-1}

/* === Level 1: Workbench === */
#wb{display:none}
#wb.show{display:block}
.crumbs{font-size:12px;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.crumbs a{color:var(--primary-light);cursor:pointer;text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.wb-title{font-size:18px;font-weight:700;margin-bottom:12px}
.flow{display:flex;gap:12px;align-items:flex-start}
.flow-side{width:260px;flex-shrink:0}
.flow-side .fld{margin-bottom:8px}
.flow-side label{display:block;font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:2px}
.flow-side input,.flow-side textarea,.flow-side select{width:100%;padding:4px 8px;font-size:13px}
.flow-side textarea{resize:vertical;min-height:36px}
.flow-main{flex:1}
.sc-card{padding:12px;margin-bottom:10px}
.sc-card table{width:100%;border-collapse:collapse}
.sc-card th{text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);padding:4px 6px;border-bottom:1px solid var(--border)}
.sc-card td{padding:5px 6px;border-bottom:1px solid var(--border);font-size:13px}
.sc{display:flex;align-items:center;gap:6px}
.sc input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:var(--border);border-radius:2px}
.sc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--primary-light);cursor:pointer;border:2px solid #fff}
.sv{font-size:14px;font-weight:600;color:var(--primary-light);min-width:16px;text-align:center}
.wi{width:40px;text-align:center;padding:2px;font-size:12px}
.tb{font-size:24px;font-weight:700;color:var(--primary);text-align:center;padding:4px 0}
.rg{display:flex;gap:8px;margin:10px 0}
.rg label{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;transition:all .12s}
.rg label:active{transform:scale(.97)}
.rg label:has(input:checked){border-color:var(--primary-light);background:var(--primary-bg)}
.hl{list-style:none}
.hl li{padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:8px}
.hl .ht{color:var(--text-muted);font-size:11px;min-width:40px}
.impl-btn{padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-size:12px;cursor:pointer;transition:all .12s}
.impl-btn:active{transform:scale(.97)}
.impl-btn.active{border-color:var(--primary-light);background:var(--primary-bg);color:var(--primary);font-weight:500}

@media(max-width:640px){.flow{flex-direction:column}.flow-side{width:100%}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <span class="back" id="backBtn" onclick="goBack()">← 返回</span>
  <h1 id="pageTitle">创新实验室</h1>
</header>

<div id="dir">
  <div class="stats" id="dirStats"></div>
  <div class="content">
    <div class="filters">
      <select id="fd"><option value="">全部领域</option></select>
      <input id="fq" placeholder="搜索实验室或 PoC...">
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="wb">
  <div class="content">
    <div class="crumbs"><a id="crumbDir">实验室</a> / <span id="crumbLab"></span> / <span id="crumbPoc"></span></div>
    <div class="wb-title" id="wbTitle"></div>
    <div class="flow">
      <div class="flow-side">
        <div class="fld"><label>核心假设</label><input id="hyp" placeholder="例：用户愿意为 XX 付费"></div>
        <div class="fld"><label>验证方法</label><select id="met"><option>实验</option><option>原型</option><option>调研</option></select></div>
        <div class="fld"><label>输入条件</label><textarea id="inp" rows="2" placeholder="所需资源"></textarea></div>
        <div class="fld"><label>预期输出</label><textarea id="out" rows="2" placeholder="交付物"></textarea></div>
        <button class="btn btn-primary" onclick="aiFill()" style="width:100%">AI 辅助生成</button>
      </div>
      <div class="flow-main">
        <div class="sc-card">
          <table><thead><tr><th>维度</th><th>评分</th><th>权重</th><th>得分</th></tr></thead><tbody id="ev"></tbody></table>
          <div class="tb" id="tt">3.00</div>
          <div class="text-muted" style="text-align:center;font-size:11px">综合 / 5</div>
        </div>
        <div class="rg">
          <label><input type="radio" name="cc" value="adopt"> 采纳</label>
          <label><input type="radio" name="cc" value="adjust"> 调整</label>
          <label><input type="radio" name="cc" value="abandon"> 放弃</label>
        </div>
        <textarea id="why" rows="2" style="width:100%;margin-bottom:8px" placeholder="决策理由"></textarea>
        <button class="btn btn-primary" onclick="saveWb()">记录结论</button>
        <hr style="margin:12px 0;border:none;border-top:1px solid var(--border)">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-secondary)">探索记录</h3>
        <ul class="hl" id="hl"></ul>

        <hr style="margin:12px 0;border:none;border-top:1px solid var(--border)">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)">实施 <span style="font-weight:400;color:var(--text-muted);font-size:11px">集成 · 整合</span></h3>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <span style="font-size:12px;color:var(--text-secondary);align-self:center">状态</span>
          <button class="impl-btn" data-s="pending" onclick="setImpl('pending')">未开始</button>
          <button class="impl-btn" data-s="active" onclick="setImpl('active')">进行中</button>
          <button class="impl-btn" data-s="done" onclick="setImpl('done')">已完成</button>
        </div>
        <div class="fld" style="margin-top:0">
          <label>集成目标</label>
          <input id="implTarget" placeholder="例：对接飞书招聘、写入 HR 云看板">
        </div>
        <div class="fld">
          <label>实施记录</label>
          <textarea id="implNote" rows="2" placeholder="做了什么、遇到什么问题、下一步"></textarea>
        </div>
        <button class="btn btn-ghost" onclick="saveImpl()" style="font-size:12px">更新实施状态</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---- Data ----
const DATA = [
  {id:'human',name:'人力资源',domain:'人力资源',pocs:[{id:'p01',name:'招聘筛选网关',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'org',name:'组织管理',domain:'组织管理',pocs:[{id:'p03',name:'职能目录',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'exec',name:'执行管理',domain:'执行管理',pocs:[{id:'p04',name:'秘书处任务分诊',logs:[],implStatus:'pending',implTarget:'',implNote:''},{id:'p05',name:'技术职能协作循环',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'company',name:'业务实体',domain:'业务实体',pocs:[{id:'p06',name:'章程多维资产视图',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'innov',name:'创新',domain:'创新',pocs:[{id:'p07',name:'概念验证探索框架',logs:[],implStatus:'pending',implTarget:'',implNote:''},{id:'p09',name:'实验室目录',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'game',name:'游戏研发',domain:'游戏',pocs:[{id:'g01',name:'六角格地图',logs:[],implStatus:'pending',implTarget:'',implNote:''},{id:'g02',name:'单位移动',logs:[],implStatus:'pending',implTarget:'',implNote:''},{id:'g03',name:'地形系统',logs:[],implStatus:'pending',implTarget:'',implNote:''},{id:'g04',name:'回合流程',logs:[],implStatus:'pending',implTarget:'',implNote:''}]},
  {id:'default',name:'创始人',domain:'创始人',pocs:[]}
];
// Restore logs
const raw = JSON.parse(sessionStorage.getItem('il')||'[]');
raw.forEach(r=>{DATA.forEach(l=>l.pocs.forEach(p=>{if(p.id===r.p) p.logs.push(r);}));});
const implRaw = JSON.parse(sessionStorage.getItem('ii')||'[]');
implRaw.forEach(r=>{DATA.forEach(l=>l.pocs.forEach(p=>{if(p.id===r.id){p.implStatus=r.implStatus;p.implTarget=r.implTarget;p.implNote=r.implNote;}}));});

// ---- Navigation ----
let stack = []; // ['dir'] or ['wb', labId, pocId]

function showDir() {
  document.getElementById('dir').style.display='block';
  document.getElementById('wb').classList.remove('show');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('pageTitle').textContent='创新实验室';
  renderDir();
}

function showWb(labId, pocId) {
  const lab=DATA.find(l=>l.id===labId); if(!lab)return;
  const poc=lab.pocs.find(p=>p.id===pocId); if(!poc)return;
  document.getElementById('dir').style.display='none';
  document.getElementById('wb').classList.add('show');
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('pageTitle').textContent=poc.name+' · '+lab.name;
  document.getElementById('crumbDir').onclick=()=>goBack();
  document.getElementById('crumbLab').textContent=lab.name;
  document.getElementById('crumbPoc').textContent=poc.name;
  document.getElementById('wbTitle').textContent=poc.name+' · PoC '+poc.id;
  renderWb(lab,poc);
}

function goBack() {
  if(stack[0]==='wb'){showDir();stack=['dir'];}
}

// ---- Directory ----
function renderDir() {
  const domains=[...new Set(DATA.map(l=>l.domain))];
  const sel=document.getElementById('fd');
  sel.innerHTML='<option value="">全部领域</option>'+domains.map(d=>`<option>${d}</option>`).join('');

  const total=DATA.length, pocCount=DATA.reduce((s,l)=>s+l.pocs.length,0), logCount=raw.length;
  document.getElementById('dirStats').innerHTML=`<span><strong>${total}</strong> 实验室</span><span><strong>${pocCount}</strong> PoC</span><span><strong>${logCount}</strong> 次探索</span>`;

  renderGrid();
  document.getElementById('fd').onchange=renderGrid;
  document.getElementById('fq').oninput=renderGrid;
}

function renderGrid() {
  const d=document.getElementById('fd').value, q=document.getElementById('fq').value.toLowerCase();
  let f=DATA.filter(l=>{if(d&&l.domain!=d)return 0;if(q){let m=l.name.includes(q)||l.domain.includes(q)||l.pocs.some(p=>p.name.includes(q));if(!m)return 0}return 1});
  const grid=document.getElementById('grid');
  if(!f.length){grid.innerHTML='<div class="empty">无匹配</div>';return}
  grid.innerHTML=f.map(l=>`<div class="card"><div class="card-head"><div><span class="card-name">${l.name}</span><span class="dt">${l.domain}</span></div></div><div class="list">${l.pocs.length?l.pocs.map(p=>{
    const last=p.logs.length?p.logs[p.logs.length-1]:null;
    const st=last?'ok':'wip';
    const la=last?{adopt:'采纳',adjust:'调整',abandon:'放弃'}[last.cc]||'进行中':'待探索';
    const im={pending:'',active:'🛠',done:'✅'};
    return `<div class="li-row" onclick="enterWb('${l.id}','${p.id}')"><span class="lb"><span class="s ${st}"></span>${p.name}</span><span class="meta">${im[p.implStatus]||''} ${last?last.ts.substr(5):''} · ${la}</span></div>`;
  }).join(''):'<span class="text-muted" style="font-size:11px;padding:2px 6px">暂无 PoC</span>'}</div></div>`).join('');
}

function enterWb(labId,pocId){stack=['wb',labId,pocId];showWb(labId,pocId);}

// ---- Workbench ----
function renderWb(lab,poc){
  const last=poc.logs.length?poc.logs[poc.logs.length-1]:null;
  document.getElementById('hyp').value=last?last.h:'';

  // eval table
  document.getElementById('ev').innerHTML='';
  [['可行性','feasibility'],['成本','cost'],['风险','risk'],['收益','benefit']].forEach(([nl,k])=>{
    const v=last&&last.sc?last.sc[k]||3:3;
    document.getElementById('ev').innerHTML+=`<tr><td>${nl}</td><td><div class="sc"><input type="range" min="1" max="5" value="${v}" class="es" data-k="${k}"><span class="sv" id="${k}V">${v}</span></div></td><td><input class="wi" value="25" min="0" max="100" data-k="${k}"> %</td><td><span class="sv" id="${k}S" style="font-size:13px">0.75</span></td></tr>`;
  });
  document.querySelectorAll('.es').forEach(el=>el.oninput=function(){document.getElementById(this.dataset.k+'V').textContent=this.value;upS(this.dataset.k);calcT()});
  document.querySelectorAll('.wi').forEach(el=>el.oninput=function(){upS(this.dataset.k);calcT()});
  calcT();
  renderHL(poc);
}

function upS(k){const s=document.querySelector(`.es[data-k="${k}"]`),w=document.querySelector(`.wi[data-k="${k}"]`),se=document.getElementById(k+'S');if(s&&w&&se)se.textContent=((s.value/5)*(w.value||0)/100).toFixed(2)}
function calcT(){let t=0;document.querySelectorAll('.wi').forEach(w=>{const s=document.querySelector(`.es[data-k="${w.dataset.k}"]`);if(s)t+=(s.value/5)*(w.value||0)/100});document.getElementById('tt').textContent=(t*5).toFixed(2)}
function aiFill(){document.getElementById('hyp').value='用户愿意为个性化推荐付费';document.getElementById('met').value='原型';document.getElementById('inp').value='目标用户画像、竞品分析';document.getElementById('out').value='可交互原型、测试报告';}

function saveWb(){
  const h=document.getElementById('hyp').value.trim();if(!h)return;
  const cc=document.querySelector('input[name="cc"]:checked');
  const sc={};document.querySelectorAll('.es').forEach(el=>sc[el.dataset.k]=parseInt(el.value));
  const d=new Date(),ts=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lab=DATA.find(l=>l.id===stack[1]);const poc=lab.pocs.find(p=>p.id===stack[2]);
  const entry={ts,p:poc.id,h,cc:cc?cc.value:'',why:document.getElementById('why').value.trim(),sc};
  poc.logs.push(entry);raw.push(entry);
  sessionStorage.setItem('il',JSON.stringify(raw));
  renderHL(poc);
}

function renderHL(poc){
  const el=document.getElementById('hl');if(!el)return;
  const la={adopt:'采纳',adjust:'调整',abandon:'放弃'};
  el.innerHTML=poc.logs.length?poc.logs.slice().reverse().map(l=>`<li><span class="ht">${l.ts}</span><span>${l.h}</span>${l.cc?`<span style="color:var(--primary-light)">→ ${la[l.cc]}</span>`:''}</li>`).join(''):'<li class="text-muted" style="border:none">尚无探索记录</li>';

  // Render impl state
  const lab=DATA.find(l=>l.id===stack[1]);const poc2=lab.pocs.find(p=>p.id===stack[2]);
  document.querySelectorAll('.impl-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===poc2.implStatus));
  document.getElementById('implTarget').value=poc2.implTarget||'';
  document.getElementById('implNote').value=poc2.implNote||'';
}

function setImpl(s){
  const lab=DATA.find(l=>l.id===stack[1]);const poc=lab.pocs.find(p=>p.id===stack[2]);
  poc.implStatus=s;
  document.querySelectorAll('.impl-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===s));
  const all=[];DATA.forEach(l=>l.pocs.forEach(p=>{if(p.implStatus||p.implTarget||p.implNote)all.push({id:p.id,implStatus:p.implStatus,implTarget:p.implTarget,implNote:p.implNote});}));
  sessionStorage.setItem('ii',JSON.stringify(all));
}

function saveImpl(){
  const lab=DATA.find(l=>l.id===stack[1]);const poc=lab.pocs.find(p=>p.id===stack[2]);
  poc.implTarget=document.getElementById('implTarget').value;
  poc.implNote=document.getElementById('implNote').value;
}

// ---- Init ----
showDir();
stack=['dir'];
</script>
</body>
</html>
