<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验室目录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px;line-height:1.5}
header{background:#1e40af;color:#fff;padding:14px 24px}
header h1{font-size:18px;font-weight:600}
header .sub{font-size:13px;opacity:.7;margin-top:2px}
.stats-bar{background:#e0e7ff;padding:10px 24px;font-size:13px;color:#1e40af;display:flex;gap:24px;flex-wrap:wrap}
.filters{background:#fff;padding:12px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #e2e8f0}
.filters select,.filters input{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit}
.filters select{background:#fff;cursor:pointer}
.filters input{flex:1;min-width:200px;max-width:360px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px 24px}
.card{border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-head{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:16px;font-weight:600}
.card-desc{font-size:13px;color:#64748b;padding:0 16px 10px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;color:#fff}
.badge-active{background:#22c55e}
.badge-archived{background:#94a3b8}
.badge-deprecated{background:#ef4444}
.badge-domain{background:#e0e7ff;color:#1e40af;font-size:11px;padding:2px 7px;border-radius:4px;margin-left:6px}
.poc-list{padding:0 16px 14px;display:flex;flex-wrap:wrap;gap:4px}
.poc-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;color:#475569}
.poc-tag.done{background:#dcfce7;border-color:#bbf7d0;color:#166534}
.poc-tag.pending{background:#fef3c7;border-color:#fde68a;color:#92400e}
.card-foot{padding:8px 16px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;color:#94a3b8;display:flex;justify-content:space-between}
.card-foot a{color:#3b82f6;text-decoration:none}
.card-foot a:hover{text-decoration:underline}
.empty-state{text-align:center;padding:60px 24px;color:#94a3b8;font-size:14px;grid-column:1/-1}
</style>
</head>
<body>
<header>
  <h1>实验室目录</h1>
  <div class="sub">所有实验室的一站式入口</div>
</header>
<div class="stats-bar" id="stats-bar"></div>
<div class="filters">
  <select id="domain-filter">
    <option value="">全部领域</option>
    <option value="人力资源">人力资源</option>
    <option value="组织管理">组织管理</option>
    <option value="执行管理">执行管理</option>
    <option value="业务实体">业务实体</option>
    <option value="创新">创新</option>
    <option value="游戏">游戏</option>
    <option value="创始人">创始人</option>
  </select>
  <select id="status-filter">
    <option value="">全部状态</option>
    <option value="active">活跃</option>
    <option value="archived">已归档</option>
    <option value="deprecated">已废弃</option>
  </select>
  <input type="text" id="search" placeholder="搜索实验室或 PoC 名称...">
</div>
<div class="grid" id="lab-grid"></div>
<script>
const LABS = [
  {id:'human',name:'量潮人力资源实验室',repo:'quanttide/quanttide-laboratory-of-human-resources',domain:'人力资源',status:'active',desc:'招聘筛选、人才管理相关 PoC',pocs:[{id:'p01',name:'招聘筛选网关',status:'done'}]},
  {id:'org',name:'量潮组织管理实验室',repo:'quanttide/quanttide-laboratory-of-organization',domain:'组织管理',status:'active',desc:'职能拆解、组织设计相关 PoC',pocs:[{id:'p03',name:'职能目录',status:'done'}]},
  {id:'exec',name:'量潮执行管理实验室',repo:'quanttide/quanttide-laboratory-of-execution',domain:'执行管理',status:'active',desc:'任务分诊、技术职能协作相关 PoC',pocs:[{id:'p04',name:'秘书处任务分诊',status:'done'},{id:'p05',name:'技术职能协作循环',status:'done'}]},
  {id:'company',name:'量潮业务实体实验室',repo:'quanttide/quanttide-laboratory-of-business-entity',domain:'业务实体',status:'active',desc:'章程管理、业务实体相关 PoC',pocs:[{id:'p06',name:'章程多维资产视图',status:'done'}]},
  {id:'innov',name:'量潮创新实验室',repo:'quanttide/quanttide-laboratory-of-innovation',domain:'创新',status:'active',desc:'概念验证方法论相关 PoC',pocs:[{id:'p07',name:'概念验证探索框架',status:'done'},{id:'p09',name:'实验室目录',status:'done'}]},
  {id:'game',name:'量潮游戏研发实验室',repo:'quanttide/quanttide-laboratory-of-game-developing',domain:'游戏',status:'active',desc:'回合制战棋游戏开发 PoC',pocs:[{id:'g01',name:'六角格地图',status:'done'},{id:'g02',name:'单位移动',status:'done'},{id:'g03',name:'地形系统',status:'done'},{id:'g04',name:'回合流程',status:'done'}]},
  {id:'default',name:'量潮创始人实验室',repo:'quanttide/quanttide-example-of-founder',domain:'创始人',status:'active',desc:'跨领域元 PoC，基础设施与治理',pocs:[{id:'p08',name:'仓库备份网关',status:'done'}]}
];
function render(){const d=document.getElementById('domain-filter').value;const s=document.getElementById('status-filter').value;const q=document.getElementById('search').value.toLowerCase();let f=LABS.filter(l=>{if(d&&l.domain!==d)return false;if(s&&l.status!==s)return false;if(q){const m=l.name.toLowerCase().includes(q)||l.desc.toLowerCase().includes(q)||l.pocs.some(p=>p.name.toLowerCase().includes(q));if(!m)return false}return true});document.getElementById('stats-bar').innerHTML=`<span><strong>${LABS.length}</strong> 实验室</span><span><strong>${LABS.filter(l=>l.status==='active').length}</strong> 活跃</span><span><strong>${LABS.reduce((s,l)=>s+l.pocs.length,0)}</strong> PoC</span><span>显示 ${f.length} / ${LABS.length}</span>`;const g=document.getElementById('lab-grid');if(!f.length){g.innerHTML='<div class="empty-state">没有匹配的实验室</div>';return}g.innerHTML=f.map(l=>{const sc=`badge-${l.status}`;const sl={active:'活跃',archived:'已归档',deprecated:'已废弃'}[l.status]||l.status;return`<div class="card"><div class="card-head"><div><div class="card-name">${l.name}</div><span class="badge-domain">${l.domain}</span></div><span class="badge ${sc}">${sl}</span></div><div class="card-desc">${l.desc}</div><div class="poc-list">${l.pocs.map(p=>{const pc=p.status==='done'?'done':'pending';return`<span class="poc-tag ${pc}">${p.status==='done'?'✓':'○'} ${p.id} ${p.name}</span>`}).join('')}</div><div class="card-foot"><span>${l.pocs.length} 个 PoC</span><a href="https://github.com/${l.repo}" target="_blank">${l.repo}</a></div></div>`}).join('')}
['domain-filter','status-filter','search'].forEach(id=>document.getElementById(id).addEventListener('change',render));document.getElementById('search').addEventListener('input',render);render();
</script>
</body>
</html>
